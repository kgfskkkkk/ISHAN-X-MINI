<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ISHAN-X MD PAIR</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon:    #00FF41;
      --neon-dim: #00C957;
      --neon-glow: rgba(0,255,65,0.35);
      --bg:      #050a05;
      --surface: rgba(6,18,6,0.85);
      --border:  rgba(0,255,65,0.18);
      --text-main: #e8ffe8;
      --text-sub:  #7fa87f;
      --danger:  #ff4b4b;
    }

    /* ── BACKGROUND ── */
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,255,65,0.015) 3px,
        rgba(0,255,65,0.015) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* grid bg */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,65,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── PARTICLES ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    #particles span {
      position: absolute;
      display: block;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon), transparent 70%);
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) scale(0.4); opacity: 0; }
      15%  { opacity: 0.7; }
      85%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
    }

    /* ── CORNER DECORATIONS ── */
    .corner {
      position: fixed;
      width: 60px; height: 60px;
      pointer-events: none;
      z-index: 1;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--neon);
    }
    .corner::before { width: 2px; height: 100%; }
    .corner::after  { width: 100%; height: 2px; }
    .corner.tl { top: 18px; left: 18px; }
    .corner.tr { top: 18px; right: 18px; transform: scaleX(-1); }
    .corner.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
    .corner.br { bottom: 18px; right: 18px; transform: scale(-1); }

    /* ── WRAP ── */
    .wrap {
      position: relative;
      z-index: 10;
      width: 420px;
      max-width: 96%;
      animation: slideUp 0.9s cubic-bezier(.22,.87,.43,1) both;
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ── CARD ── */
    .box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 100px 28px 36px;
      text-align: center;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 0 0 1px rgba(0,255,65,0.07),
        0 0 60px rgba(0,255,65,0.08),
        inset 0 1px 0 rgba(0,255,65,0.12);
      transition: transform 0.5s ease, opacity 0.5s ease;
      position: relative;
      overflow: visible;
    }

    /* top glow line */
    .box::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      border-radius: 50%;
      filter: blur(1px);
    }

    /* ── AVATAR ── */
    .avatar-wrap {
      position: absolute;
      top: -62px;
      left: 50%;
      transform: translateX(-50%);
    }

    .avatar {
      width: 124px;
      height: 124px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--neon);
      box-shadow:
        0 0 0 6px rgba(0,255,65,0.08),
        0 0 30px var(--neon-glow),
        0 0 60px rgba(0,255,65,0.15);
      animation: pulse 3s ease-in-out infinite;
      position: relative;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 6px rgba(0,255,65,0.08), 0 0 30px var(--neon-glow); }
      50%       { box-shadow: 0 0 0 10px rgba(0,255,65,0.04), 0 0 50px rgba(0,255,65,0.5); }
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* online dot */
    .online-dot {
      position: absolute;
      bottom: 6px; right: 6px;
      width: 14px; height: 14px;
      background: var(--neon);
      border-radius: 50%;
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px var(--neon);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── HEADINGS ── */
    .bot-name {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.35rem;
      letter-spacing: 3px;
      color: var(--neon);
      text-shadow: 0 0 20px var(--neon-glow);
      margin-top: 4px;
    }

    .bot-tag {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-top: 4px;
    }

    .instruction {
      font-size: 0.78rem;
      color: var(--text-sub);
      margin-top: 10px;
      letter-spacing: 0.5px;
      font-weight: 300;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0 14px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--text-sub);
      font-family: 'Orbitron', monospace;
    }

    /* ── INPUT ── */
    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-sub);
      font-size: 0.85rem;
      transition: color 0.2s;
      pointer-events: none;
    }

    .input-wrap input {
      width: 100%;
      padding: 13px 14px 13px 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,255,65,0.03);
      color: var(--text-main);
      font-size: 15px;
      font-weight: 600;
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
      outline: none;
      transition: all 0.25s;
    }

    .input-wrap input::placeholder {
      color: #3d5c3d;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: 0;
    }

    .input-wrap input:focus {
      border-color: var(--neon);
      background: rgba(0,255,65,0.05);
      box-shadow: 0 0 0 3px rgba(0,255,65,0.1), inset 0 0 20px rgba(0,255,65,0.03);
    }

    .input-wrap input:focus + i,
    .input-wrap:focus-within i {
      color: var(--neon);
    }

    /* ── SUBMIT BUTTON ── */
    .submit-btn {
      margin-top: 12px;
      width: 100%;
      padding: 13px 0;
      background: var(--neon);
      color: #010d01;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      letter-spacing: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .submit-btn:hover::before { transform: translateX(100%); }
    .submit-btn:hover {
      background: #fff;
      box-shadow: 0 0 30px var(--neon-glow);
      transform: translateY(-1px);
    }
    .submit-btn:active { transform: scale(0.98); }

    .submit-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    /* ── RESULT BOX ── */
    #pair {
      min-height: 32px;
      margin-top: 14px;
      font-size: 0.82rem;
    }

    .result-card {
      background: rgba(0,255,65,0.04);
      border: 1px solid rgba(0,255,65,0.2);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .result-card:hover { background: rgba(0,255,65,0.08); }

    .result-card .label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--text-sub);
      font-family: 'Orbitron', monospace;
      margin-bottom: 4px;
    }

    .result-card .code-val {
      font-family: 'Orbitron', monospace;
      font-size: 1.05rem;
      color: var(--neon);
      letter-spacing: 4px;
      text-shadow: 0 0 10px var(--neon-glow);
    }

    .result-card .copy-hint {
      position: absolute;
      top: 8px; right: 12px;
      font-size: 0.65rem;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── ACTIONS ── */
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 18px;
    }

    .join-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--neon);
      color: var(--neon);
      padding: 10px 0;
      border-radius: 10px;
      font-weight: 600;
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .join-btn:hover {
      background: var(--neon);
      color: #010d01;
      box-shadow: 0 0 20px var(--neon-glow);
    }

    .clear-btn {
      background: transparent;
      border: 1px solid rgba(255,75,75,0.35);
      padding: 10px 16px;
      border-radius: 10px;
      color: var(--danger);
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .clear-btn:hover {
      background: rgba(255,75,75,0.1);
      border-color: var(--danger);
    }

    /* ── FOOTER ── */
    .footer-line {
      margin-top: 22px;
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 2px;
      color: #2d4a2d;
      text-transform: uppercase;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,255,65,0.12);
      border: 1px solid var(--neon);
      color: var(--neon);
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Orbitron', monospace;
      letter-spacing: 2px;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: all 0.3s;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── HIDE ANIMATION ── */
    .box.hide {
      transform: translateY(100px) scale(0.95);
      opacity: 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 420px) {
      .avatar { width: 100px; height: 100px; }
      .avatar-wrap { top: -50px; }
      .box { padding: 84px 20px 30px; border-radius: 20px; }
      .bot-name { font-size: 1.1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>

<body>
  <!-- corner accents -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- particles -->
  <div id="particles"></div>

  <div class="wrap">
    <div class="box" id="mainBox">

      <div class="avatar-wrap">
        <div class="avatar">
          <img src="https://raw.githubusercontent.com/minibotsjsisns/IMAGE_DATA/refs/heads/main/file_00000000f90c7208838f193f050a844f.png" alt="ISHAN-X Bot Avatar">
          <div class="online-dot"></div>
        </div>
      </div>

      <div class="bot-name">ISHAN-X MD PRO</div>
      <div class="bot-tag">PAIR SYSTEM &nbsp;·&nbsp; CANET BOT</div>

      <p class="instruction">Enter your WhatsApp number with country code</p>

      <div class="divider"><span>CONNECT</span></div>

      <div class="input-wrap">
        <input
          id="number"
          type="tel"
          placeholder="94XXXXXXXXX"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="off"
        />
        <i class="fas fa-mobile-alt" style="pointer-events:none"></i>
      </div>

      <button id="submit" class="submit-btn">
        <span id="btn-text">GET PAIR CODE</span>
      </button>

      <div id="pair"></div>

      <div class="actions">
        <button class="join-btn" id="joinBtn">
          <i class="fab fa-whatsapp"></i> JOIN CHANNEL
        </button>
        <button class="clear-btn" id="clearBtn">
          <i class="fas fa-trash-alt"></i> CLEAR
        </button>
      </div>

      <div class="footer-line">ISHAN-X MD &nbsp;©&nbsp; 2025</div>
    </div>
  </div>

  <!-- toast -->
  <div class="toast" id="toast">COPIED!</div>

  <script>
    /* ── PARTICLES ── */
    const pc = document.getElementById('particles');
    for (let i = 0; i < 55; i++) {
      const s = document.createElement('span');
      const size = Math.random() * 5 + 2;
      s.style.cssText = `
        left: ${Math.random()*100}vw;
        width: ${size}px;
        height: ${size}px;
        animation-duration: ${7 + Math.random()*8}s;
        animation-delay: ${Math.random()*8}s;
      `;
      pc.appendChild(s);
    }

    /* ── TOAST ── */
    function showToast(msg = 'COPIED!') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    /* ── SUBMIT ── */
    const pairEl  = document.getElementById('pair');
    const submit  = document.getElementById('submit');
    const btnText = document.getElementById('btn-text');
    const numEl   = document.getElementById('number');

    submit.addEventListener('click', async () => {
      const raw = numEl.value.replace(/[^0-9]/g, '');
      if (!raw || raw.length < 11) {
        pairEl.innerHTML = `<p style="color:#ff4b4b;font-size:.8rem;margin-top:6px"><i class="fas fa-exclamation-circle"></i> Enter a valid number (min 11 digits)</p>`;
        numEl.focus();
        return;
      }

      numEl.value = '+' + raw;
      numEl.style.color = 'var(--text-sub)';
      submit.classList.add('loading');
      btnText.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> CONNECTING...';
      pairEl.innerHTML  = `<p style="color:var(--text-sub);font-size:.78rem;margin-top:8px;letter-spacing:1px">Establishing secure link...</p>`;

      try {
        const res  = await fetch(`/code?number=${raw}`);
        const data = await res.json();
        const code = data.code || 'UNAVAILABLE';

        pairEl.innerHTML = `
          <div class="result-card" id="copyCard" onclick="copyCode('${code}')">
            <div class="label">PAIR CODE</div>
            <div class="code-val" id="codeVal">${code}</div>
            <div class="copy-hint"><i class="fas fa-copy"></i> tap to copy</div>
          </div>`;
      } catch {
        pairEl.innerHTML = `<p style="color:#ff4b4b;font-size:.8rem;margin-top:8px;letter-spacing:1px"><i class="fas fa-wifi"></i> Connection failed. Try again.</p>`;
      }

      submit.classList.remove('loading');
      btnText.textContent = 'GET PAIR CODE';
    });

    function copyCode(code) {
      navigator.clipboard?.writeText(code).then(() => showToast('COPIED!'));
    }

    /* ── CLEAR ── */
    document.getElementById('clearBtn').addEventListener('click', () => {
      numEl.value = '';
      numEl.style.color = '';
      pairEl.innerHTML = '';
    });

    /* ── JOIN ── */
    const mainBox  = document.getElementById('mainBox');
    const CHANNEL  = 'https://whatsapp.com/channel/0029VbAe6Nt545uv1kaCDE3j';

    document.getElementById('joinBtn').addEventListener('click', () => {
      mainBox.classList.add('hide');
      setTimeout(() => {
        const w = window.open(CHANNEL, '_blank', 'noopener,noreferrer');
        if (!w) window.location.href = CHANNEL;
        setTimeout(() => mainBox.classList.remove('hide'), 600);
      }, 450);
    });

    /* ── ENTER KEY ── */
    numEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit.click(); });
  </script>
</body>
</html>
